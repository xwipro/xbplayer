<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xbplayer</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/xbplayer.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        .__xbplayer {
            width: 100%;
            height: 100%;
            background: #000;
            user-select: none;
        }
        .input_box {
            display: flex;
            position: absolute;
            top: .2rem;
            left: 20rem;
            z-index: 999;
            border-radius: 3rem;
            overflow: hidden;
        }
        .input_box input {
            width: 50rem;
            height: 3rem;
            outline: none;
            border: none;
            padding: 0 1.3rem;
            font-size: 1.3rem;
            background: #ffffffb3;
            backdrop-filter: blur(1.2rem);
        }
        .input_box button {
            height: 3rem;
            color: #fff;
            background: #ffffffb3;
            border: none;
            outline: none;
            border-left: 1px solid #000;
            padding: 0 1rem;
            cursor: pointer;
        }
    </style>
    <script src="/xbplayer.js"></script>
</head>
<body>
    <div class="input_box">
        <input type="text" class="search_input" placeholder="输入视频/直播地址">
        <button class="search_button">-> Search</button>
    </div>
    <div class="__xbplayer"></div>
    <script>
        const searchInput = document.querySelector(".search_input");
        const searchButton = document.querySelector(".search_button");

        // 获取地址栏参数
        const urlParams = new URLSearchParams(window.location.search);
        // 是否为直播
        const isLive = urlParams.get("lv") === "cv";

        // 封装播放器初始化函数，无url也会渲染空播放框架
        const vidFunction = (url = "") => {
            // 每次调用都会重新实例化播放器，渲染播放框架
            const player = new XbPlayer({
                container: ".__xbplayer",
                src: url,
                isLive: isLive
            })
        }

        // 搜索按钮点击事件（修复原代码赋值错误）
        searchButton.addEventListener("click", () => {
            const url = searchInput.value.trim();
            vidFunction(url);
        })

        // 回车快捷搜索
        searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const url = searchInput.value.trim();
                vidFunction(url);
            }
        })

        // DOM加载完毕立刻渲染播放框架（核心需求）
        document.addEventListener("DOMContentLoaded", () => {
            vidFunction();
        })
    </script>
</body>
</html>
